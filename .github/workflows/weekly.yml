name: IG Weekly Audit

on:
  schedule:
    # Senin 02:00 UTC = 09:00 WIB
    - cron: '0 2 * * 1'
  workflow_dispatch:  # manual trigger via GitHub UI

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run audit
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python audit.py

      - name: Archive snapshot + PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output-${{ github.run_id }}
          path: |
            ig-weekly-audit-*.pdf
            snapshot-*.json
          retention-days: 90
