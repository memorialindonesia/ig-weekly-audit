name: IG Audit (Weekly + Monthly Rolling)

on:
  schedule:
    # Senin 02:00 UTC = 09:00 WIB
   - cron: '0 18 * * 0'
     workflow_dispatch:  # manual trigger via GitHub UI

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run audit (generates both weekly + monthly)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python audit.py

      - name: Archive snapshots + PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.run_id }}
          path: |
            ig-weekly-audit-*.pdf
            ig-monthly-audit-*.pdf
            snapshot-weekly-*.json
            snapshot-monthly-*.json
          retention-days: 365
